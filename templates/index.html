<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozRashi</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <h1>🌟 RozRashi</h1>
    <span class="date" id="today-date"></span>
</div>

<!-- ===== TOAST MESSAGE ===== -->
<div class="toast" id="toast">✅ कॉपी हो गया!</div>

<!-- ===== HOME SCREEN ===== -->
<div class="screen active" id="screen-home">
    <div class="welcome-card">
        <h2>🙏 नमस्ते!</h2>
        <p>अपनी राशि चुनें और आज का राशिफल देखें</p>
    </div>
    <div class="section-title">⭐ अपनी राशि चुनें</div>
    <div class="rashi-grid" id="rashi-grid">
        <div class="loading">राशि लोड हो रही है...</div>
    </div>
    <div class="section-title">💬 आज का स्टेटस</div>
    <div id="home-status-preview">
        <div class="loading">स्टेटस लोड हो रही है...</div>
    </div>
</div>

<!-- ===== RASHI LIST SCREEN ===== -->
<div class="screen" id="screen-rashifal">
    <div class="section-title">🔮 सभी राशियाँ</div>
    <div class="rashi-grid" id="rashifal-grid">
        <div class="loading">राशि लोड हो रही है...</div>
    </div>
</div>

<!-- ===== RASHI DETAIL SCREEN ===== -->
<div class="screen" id="screen-rashi-detail">
    <button class="back-btn" onclick="goBack()">← वापस जाएं</button>
    <div id="rashi-detail-content">
        <div class="loading">लोड हो रही है...</div>
    </div>
</div>

<!-- ===== STATUS SCREEN ===== -->
<div class="screen" id="screen-status">
    <div class="category-tabs" id="category-tabs">
    <button class="tab-btn active"
        onclick="loadStatus('good_morning', this)">
        🌅 सुप्रभात
    </button>
    <button class="tab-btn"
        onclick="loadStatus('bhakti_quotes', this)">
        🙏 भक्ति
    </button>
    <button class="tab-btn"
        onclick="loadStatus('mantra_status', this)">
        🕉️ मंत्र
    </button>
    <button class="tab-btn"
        onclick="loadStatus('festival', this)">
        🪔 त्योहार
    </button>
    <button class="tab-btn"
        onclick="loadStatus('stotra', this)">
        📿 स्तोत्र
    </button>
</div>

<!-- ===== IMAGE CARD GENERATOR OVERLAY ===== -->
<div class="generator-overlay" id="generatorOverlay">
    <div class="generator-box">

        <div class="generator-header">
            <span class="generator-title">🎨 Image Status बनाएं</span>
            <button class="generator-close" onclick="closeGenerator()">✕</button>
        </div>

        <!-- STATUS TEXT PREVIEW -->
        <div style="background:#0f0f1a;border-radius:10px;padding:12px;
                    margin-bottom:14px;font-size:14px;line-height:1.7;
                    color:#ddddff;font-family:'Hind',sans-serif;"
             id="generatorText">
        </div>

        <!-- THEME SELECTOR -->
        <div class="theme-label">🎨 थीम चुनें</div>
        <div class="theme-row">
            <button class="theme-btn theme-purple selected"
                onclick="selectTheme(0,this)">Purple</button>
            <button class="theme-btn theme-sunset"
                onclick="selectTheme(1,this)">Sunset</button>
            <button class="theme-btn theme-ocean"
                onclick="selectTheme(2,this)">Ocean</button>
            <button class="theme-btn theme-forest"
                onclick="selectTheme(3,this)">Forest</button>
            <button class="theme-btn theme-rose"
                onclick="selectTheme(4,this)">Rose</button>
            <button class="theme-btn theme-dark"
                onclick="selectTheme(5,this)">Dark</button>
        </div>

        <!-- CANVAS PREVIEW -->
        <div class="theme-label">👁️ Preview</div>
        <div class="canvas-wrap">
            <canvas id="statusCanvas" width="1080" height="1080"></canvas>
        </div>

        <!-- BUTTONS -->
        <div class="gen-btn-row">
            <button class="btn-download" onclick="downloadImage()">
                📥 Download
            </button>
            <button class="btn-wa-share" onclick="shareImage()">
                📤 WhatsApp
            </button>
        </div>

    </div>
</div>
<!-- ===== BOTTOM NAVIGATION ===== -->

<div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">होम</span>
    </button>
    <button class="nav-btn" id="nav-rashifal" onclick="showScreen('rashifal')">
        <span class="nav-icon">🔮</span>
        <span class="nav-label">राशिफल</span>
    </button>
    <button class="nav-btn" id="nav-status" onclick="showScreen('status')">
        <span class="nav-icon">💬</span>
        <span class="nav-label">स्टेटस</span>
    </button>
</div>
    <script src="/static/app.js"></script>
</body>
</html>
